# AuraOS Picom Compositor Configuration
# Frosted-glass transparency and smooth animations

# -- Shadows
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.40;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "_GTK_FRAME_EXTENTS@:c"
];

# -- Fading (Smooth window opening/closing)
fading = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;
fade-delta = 4;

# -- Transparency/Opacity
inactive-opacity = 0.95;
active-opacity   = 1.0;
frame-opacity    = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "90:class_g = 'Aura-gui' || class_g = 'Aura-client' || class_g = 'aura-gui'",
    "95:class_g = 'Alacritty'"
];

# -- Blur (Frosted glassmorphism)
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-kern = "3x3box";
blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Conky'"
];

# -- General Settings
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;

wintypes: {
    tooltip      = { fade = true; shadow = false; opacity = 0.85; focus = true; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
    utility      = { shadow = false; };
};

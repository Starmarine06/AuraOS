-- AuraOS Rainmeter-style Desktop Monitoring Widget Config
-- Sleek, translucent glassmorphic look

conky.config = {
    alignment = 'top_right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'DejaVu Sans:size=10',
    gap_x = 24,
    gap_y = 50,
    minimum_height = 500,
    minimum_width = 280,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xftalpha = 0.8,
    
    -- Color Theme (Catppuccin Mocha style)
    color1 = 'CBA6F7', -- Mauve
    color2 = '89B4FA', -- Blue
    color3 = 'A6E3A1', -- Green
    color4 = 'F38BA8', -- Red
    color5 = 'CDD6F4', -- Text
    color6 = '6C7086', -- Subtext
}

conky.text = [[
${color1}${font DejaVu Sans:style=Bold:size=22}${alignc}${time %H:%M}${font}
${color5}${font DejaVu Sans:size=12}${alignc}${time %A, %d %B %Y}${font}
${color6}${hr 2}

${color2}${font DejaVu Sans:style=Bold:size=11}SYSTEM INFO${font}${color5}
${color6}OS:$alignr${color5}AuraOS (Pure Rust Init)
${color6}Kernel:$alignr${color5}${kernel}
${color6}Uptime:$alignr${color5}${uptime}

${color2}${font DejaVu Sans:style=Bold:size=11}CPU PROCESSOR${font}${color5}
${color6}CPU Speed:$alignr${color5}${freq_g} GHz
${color6}CPU Usage:$alignr${color5}${cpu}%
${color1}${cpugraph 40,280 CBA6F7 89B4FA -t}

${color2}${font DejaVu Sans:style=Bold:size=11}MEMORY (RAM)${font}${color5}
${color6}RAM Usage:$alignr${color5}${mem} / ${memmax} (${memperc}%)
${color3}${membar 8,280}

${color2}${font DejaVu Sans:style=Bold:size=11}STORAGE (DISK)${font}${color5}
${color6}Root Partition:$alignr${color5}${fs_used /} / ${fs_size /} (${fs_used_perc /}%)
${color3}${fs_bar 8,280 /}

${color2}${font DejaVu Sans:style=Bold:size=11}NETWORK ACTIVITY${font}${color5}
${color6}Download Speed:$alignr${color5}${downspeed lo}
${color6}Upload Speed:$alignr${color5}${upspeed lo}
${color6}Total IP Addr:$alignr${color5}${addr lo}
]]
